<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bakary Aguibou Tall — Contact</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d1b5e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Particules flottantes */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .p {
      position: absolute;
      border-radius: 50%;
      background: rgba(245, 197, 24, 0.15);
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Anneaux pulsants en arrière-plan */
    .rings { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 0; }
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(245, 197, 24, 0.08);
      animation: pulse-ring ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.4); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* Lumière ambiante qui bouge */
    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(46,64,160,0.4) 0%, transparent 70%);
      animation: glow-move 8s ease-in-out infinite alternate;
      pointer-events: none; z-index: 0;
    }
    @keyframes glow-move {
      0%   { transform: translate(-30%, -30%); }
      100% { transform: translate(30%, 30%); }
    }

    /* Card */
    .card {
      position: relative; z-index: 10;
      background: rgba(22, 35, 104, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(245, 197, 24, 0.2);
      border-radius: 28px;
      padding: 44px 32px 40px;
      width: 320px;
      text-align: center;
      animation: card-in 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes card-in {
      from { transform: translateY(40px) scale(0.9); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Ligne dorée animée en haut de la card */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #F5C518, transparent);
      border-radius: 2px;
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { left: 20%; right: 20%; opacity: 0.5; }
      50%       { left: 5%;  right: 5%;  opacity: 1; }
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      width: 96px; height: 96px;
      margin: 0 auto 20px;
    }
    .avatar-ring {
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #F5C518;
      border-right-color: #F5C518;
      animation: spin 3s linear infinite;
    }
    .avatar-ring2 {
      position: absolute; inset: -12px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-bottom-color: rgba(245,197,24,0.4);
      border-left-color: rgba(245,197,24,0.4);
      animation: spin 5s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: #F5C518;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      animation: avatar-glow 3s ease-in-out infinite alternate;
    }
    @keyframes avatar-glow {
      from { box-shadow: 0 0 0px rgba(245,197,24,0); }
      to   { box-shadow: 0 0 24px rgba(245,197,24,0.5); }
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    h1 {
      color: #fff; font-size: 17px; font-weight: 600;
      letter-spacing: 1px; margin-bottom: 4px;
      animation: fade-up 0.6s 0.3s both;
    }
    .role {
      color: #8fa3e0; font-size: 11px; letter-spacing: 2px; margin-bottom: 2px;
      animation: fade-up 0.6s 0.4s both;
    }
    .company {
      color: #F5C518; font-size: 11px; letter-spacing: 1px; margin-bottom: 32px;
      opacity: 0.8;
      animation: fade-up 0.6s 0.5s both;
    }
    @keyframes fade-up {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* Boutons */
    .btn {
      display: flex; align-items: center; gap: 14px;
      border-radius: 16px; padding: 16px 20px;
      text-decoration: none; margin-bottom: 12px;
      position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fade-up 0.6s both;
    }
    .btn:nth-child(1) { animation-delay: 0.6s; }
    .btn:nth-child(2) { animation-delay: 0.75s; }
    .btn:hover  { transform: translateY(-2px); }
    .btn:active { transform: scale(0.97); }

    /* Effet shine au hover */
    .btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.4s;
    }
    .btn:hover::after { left: 150%; }

    .btn-whatsapp {
      background: #25D366;
      box-shadow: 0 4px 20px rgba(37,211,102,0.25);
    }
    .btn-whatsapp:hover { box-shadow: 0 8px 30px rgba(37,211,102,0.45); }

    .btn-email {
      background: #2E40A0;
      box-shadow: 0 4px 20px rgba(46,64,160,0.3);
    }
    .btn-email:hover { box-shadow: 0 8px 30px rgba(46,64,160,0.55); }

    .btn-label { color: #fff; font-size: 14px; font-weight: 600; display: block; text-align: left; }
    .btn-sub   { color: rgba(255,255,255,0.75); font-size: 11px; display: block; margin-top: 2px; text-align: left; }

    .footer {
      color: rgba(255,255,255,0.2); font-size: 10px;
      letter-spacing: 1.5px; margin-top: 24px;
      animation: fade-up 0.6s 0.9s both;
    }

    /* Étoiles fixes */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; }
      50%       { opacity: 0.8; }
    }
  </style>
</head>
